<!doctype html>
<html lang="sv" data-bs-theme="auto">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="author" content="Mattias Stjernström">
    <title>Mehow.se</title>

     <!-- Latest compiled and minified CSS -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/css/bootstrap.min.css">

    <!-- jQuery library -->
    <script src="https://cdn.jsdelivr.net/npm/jquery@3.6.4/dist/jquery.slim.min.js"></script>

    <!-- Popper JS -->
    <script src="https://cdn.jsdelivr.net/npm/popper.js@1.16.1/dist/umd/popper.min.js"></script>

    <!-- Latest compiled JavaScript -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/js/bootstrap.bundle.min.js"></script> 

    <style>
        body {
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0;
            min-height: 100vh;
            background-color: black;
            overflow: hidden;
          }
          
          .deconstructed {
            position: relative;
            margin: auto;
            height: 0.71em;
            color: transparent;
            font-family: 'Cambay', sans-serif;
            font-size: 10vw;
            font-weight: 700;
            letter-spacing: -0.02em;
            line-height: 1.03em;
          }
          
          .deconstructed > div {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            pointer-events: none;
            color: rgb(104, 158, 221);
          }
          
          .deconstructed > div:nth-child(1) {
            -webkit-mask-image: linear-gradient(black 25%, transparent 25%);
            mask-image: linear-gradient(black 25%, transparent 25%);
            animation: deconstructed1 5s infinite;
          }
          
          .deconstructed > div:nth-child(2) {
            -webkit-mask-image: linear-gradient(transparent 25%, black 25%, black 50%, transparent 50%);
            mask-image: linear-gradient(transparent 25%, black 25%, black 50%, transparent 50%);
            animation: deconstructed2 5s infinite;
          }
          
          .deconstructed > div:nth-child(3) {
             -webkit-mask-image: linear-gradient(transparent 50%, black 50%, black 75%, transparent 75%);
            mask-image: linear-gradient(transparent 50%, black 50%, black 75%, transparent 75%);
            animation: deconstructed3 5s infinite;
          }
          
          .deconstructed > div:nth-child(4) {
             -webkit-mask-image: linear-gradient(transparent 75%, black 75%);
            mask-image: linear-gradient(transparent 75%, black 75%);
            animation: deconstructed4 5s infinite;
          }
          
          @keyframes deconstructed1 {
            0% {
              transform: translateX(100%);
            }
            26% {
              transform: translateX(0%);
            }
            83% {
              transform: translateX(-0.1%);
            }
            100% {
              transform: translateX(-220%);
            }
          }
          
          @keyframes deconstructed2 {
            0% {
              transform: translateX(100%);
            }
            24% {
              transform: translateX(0.5%);
            }
            82% {
              transform: translateX(-0.2%);
            }
            100% {
              transform: translateX(-225%);
            }
          }
          
          @keyframes deconstructed3 {
            0% {
              transform: translateX(100%);
            }
            22% {
              transform: translateX(0%);
            }
            81% {
              transform: translateX(0%);
            }
            100% {
              transform: translateX(-230%);
            }
          }
          
          @keyframes deconstructed4 {
            0% {
              transform: translateX(100%);
            }
            20% {
              transform: translateX(0%);
            }
            80% {
              transform: translateX(0%);
            }
            100% {
              transform: translateX(-235%);
            }
          }
    </style>

</head>
<body>
    <div class="deconstructed">
        Mehow.Se
        <div>Mehow.Se</div>
        <div>Mehow.Se</div>
        <div>Mehow.Se</div>
        <div>Mehow.Se</div>
      </div>
</body>
</html>
